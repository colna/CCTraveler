name: release

# 推 v* 标签即触发；构建 4 个目标的预编译二进制并上传到 Release。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (linux-aarch64 only)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build
        env:
          CARGO_TERM_COLOR: always
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p cctraveler
          else
            cargo build --release --target ${{ matrix.target }} -p cctraveler
          fi

      - name: Package tarball
        id: package
        run: |
          set -e
          BIN_PATH="target/${{ matrix.target }}/release/cctraveler"
          TAG="${GITHUB_REF_NAME:-dev}"
          OUT="cctraveler-${TAG}-${{ matrix.target }}.tar.gz"
          tar -czf "$OUT" -C "$(dirname "$BIN_PATH")" "$(basename "$BIN_PATH")"
          shasum -a 256 "$OUT" > "$OUT.sha256" || sha256sum "$OUT" > "$OUT.sha256"
          echo "tarball=$OUT" >> "$GITHUB_OUTPUT"
          echo "checksum=$OUT.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cctraveler-${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.tarball }}
            ${{ steps.package.outputs.checksum }}

  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List artifacts
        run: ls -la dist/**/*

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.sha256
          generate_release_notes: true
